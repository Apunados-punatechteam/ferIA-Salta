services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4100:4100"
    environment:
      NODE_ENV: production
      PORT: 4100
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ARKIV_PRIVATE_KEY: ${ARKIV_PRIVATE_KEY}
      ARKIV_PROJECT_ATTRIBUTE_KEY: ${ARKIV_PROJECT_ATTRIBUTE_KEY}
      ARKIV_PROJECT_ATTRIBUTE_VALUE: ${ARKIV_PROJECT_ATTRIBUTE_VALUE}
      STELLAR_NETWORK: ${STELLAR_NETWORK}
      STELLAR_HORIZON_URL: ${STELLAR_HORIZON_URL}
      STELLAR_RECEIVER_PUBLIC_KEY: ${STELLAR_RECEIVER_PUBLIC_KEY}
      STELLAR_MUNICIPALITY_RECEIVER_PUBLIC_KEY: ${STELLAR_MUNICIPALITY_RECEIVER_PUBLIC_KEY}
      STELLAR_FAIR_REGISTRATION_AMOUNT_XLM: ${STELLAR_FAIR_REGISTRATION_AMOUNT_XLM}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      - backend
