server {
    listen 80;

    resolver 127.0.0.11 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    resolver 127.0.0.11 valid=30s;

    location /api/ {
        set $backend_upstream http://backend:4100;
        proxy_pass $backend_upstream;
    }

    location /uploads/ {
        set $backend_upstream http://backend:4100;
        proxy_pass $backend_upstream;
    }
}
